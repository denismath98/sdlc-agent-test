name: AI Review

on:
  workflow_run:
    workflows: ["PR CI"]
    types: [completed]

jobs:
  review:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run reviewer in Docker
        run: |
          docker run --rm \
            -e GITHUB_TOKEN="${{ secrets.GH_PAT }}" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e LLM_CONFIG_JSON='${{ secrets.LLM_CONFIG_JSON }}' \
            -e CI_WORKFLOW_CONCLUSION="${{ github.event.workflow_run.conclusion }}" \
            -e CI_WORKFLOW_NAME="${{ github.event.workflow_run.name }}" \
            -e REPO_PATH=/repo \
            -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/denismath98/sdlc-agent:latest \
            review-apply --pr "${{ github.event.workflow_run.pull_requests[0].number }}"