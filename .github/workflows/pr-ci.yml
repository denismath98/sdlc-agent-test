name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- INSTALL ---
      - name: Install
        id: install
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip

          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install . 2>&1 | tee install.log
          else
            echo "No pyproject.toml or setup.py found, skipping pip install ." | tee install.log
          fi

          pip install black pytest 2>&1 | tee -a install.log

      - name: Record install result
        run: |
          if [ "${{ steps.install.outcome }}" = "success" ]; then
            echo "INSTALL_EXIT_CODE=0" >> "$GITHUB_ENV"
            echo "INSTALL_STATUS=success" >> "$GITHUB_ENV"
          else
            echo "INSTALL_EXIT_CODE=1" >> "$GITHUB_ENV"
            echo "INSTALL_STATUS=failure" >> "$GITHUB_ENV"
          fi

      # --- BLACK ---
      - name: Black (check)
        id: black
        continue-on-error: true
        run: |
          black --check . 2>&1 | tee black.log

      - name: Record black result
        run: |
          if [ "${{ steps.black.outcome }}" = "success" ]; then
            echo "BLACK_EXIT_CODE=0" >> "$GITHUB_ENV"
            echo "BLACK_STATUS=success" >> "$GITHUB_ENV"
          else
            echo "BLACK_EXIT_CODE=1" >> "$GITHUB_ENV"
            echo "BLACK_STATUS=failure" >> "$GITHUB_ENV"
          fi

      # --- PYTEST ---
      - name: Pytest
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest -q 2>&1 | tee pytest.log

      - name: Record pytest result
        run: |
          if [ "${{ steps.pytest.outcome }}" = "success" ]; then
            echo "PYTEST_EXIT_CODE=0" >> "$GITHUB_ENV"
            echo "PYTEST_STATUS=success" >> "$GITHUB_ENV"
          else
            echo "PYTEST_EXIT_CODE=1" >> "$GITHUB_ENV"
            echo "PYTEST_STATUS=failure" >> "$GITHUB_ENV"
          fi

      # --- ARTIFACTS ---
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            install.log
            pytest.log
            black.log
          if-no-files-found: warn

      # --- SUMMARY ---
      - name: Summary
        if: always()
        run: |
          {
            echo "# PR CI summary"
            echo ""
            echo "- Install: **${INSTALL_STATUS}** (exit=${INSTALL_EXIT_CODE})"
            echo "- Black: **${BLACK_STATUS}** (exit=${BLACK_EXIT_CODE})"
            echo "- Pytest: **${PYTEST_STATUS}** (exit=${PYTEST_EXIT_CODE})"
            echo ""
            echo "Artifacts: **ci-logs** (install.log, pytest.log, black.log)"
          } >> "$GITHUB_STEP_SUMMARY"
          
      - name: Always succeed
        if: always()
        run: exit 0
